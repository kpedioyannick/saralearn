# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.
# See also https://symfony.com/doc/current/service_container/import.html

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    # Content generator (IA) - valeurs par défaut si les env ne sont pas définies
    env_default_empty: ''
    openai_api_key: '%env(default:env_default_empty:OPENAI_API_KEY)%'
    openai_model_default: 'gpt-4o-mini'
    openai_model: '%env(default:openai_model_default:OPENAI_MODEL)%'
    deepseek_api_key: '%env(default:env_default_empty:DEEPSEEK_API_KEY)%'
    deepseek_model_default: 'deepseek-chat'
    deepseek_model: '%env(default:deepseek_model_default:DEEPSEEK_MODEL)%'
    curl_content_url: '%env(default:env_default_empty:CURL_CONTENT_URL)%'
    curl_content_timeout_default: 600
    curl_content_timeout: '%env(int:default:curl_content_timeout_default:CURL_CONTENT_TIMEOUT)%'
    content_generator_default_value: 'curl'
    content_generator_default: '%env(default:content_generator_default_value:CONTENT_GENERATOR_DEFAULT)%'
    suno_api_key: '%env(default:env_default_empty:SUNO_API_KEY)%'
    suno_studio_bearer: '%env(default:env_default_empty:SUNO_STUDIO_BEARER)%'
    suno_studio_browser_token: '%env(default:env_default_empty:SUNO_STUDIO_BROWSER_TOKEN)%'
    suno_studio_device_id: '%env(default:env_default_empty:SUNO_STUDIO_DEVICE_ID)%'

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'

    App\Service\InteractiveBook\InteractiveBookFileGenerator:
        arguments:
            $projectDir: '%kernel.project_dir%'
            $contentBasePath: 'h5p/server/content'

    App\Service\Suno\SunoApiClient:
        arguments:
            $apiKey: '%suno_api_key%'

    App\Service\Suno\SunoStudioClient:
        arguments:
            $bearerToken: '%suno_studio_bearer%'
            $browserToken: '%suno_studio_browser_token%'
            $deviceId: '%suno_studio_device_id%'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones
